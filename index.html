<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Yu-Gi-Oh! LP Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <style>
    :root{
      --bg:#000;
      --panel:#050505;
      --line:#1d1d1d;
      --text:#fff;
      --muted:#8a8a8a;
      --green:#22c55e;
      --red:#ef4444;
      --blue:#3b82f6;
      --blue-dark:#0f172a;
      --gray:#151515;
      --gray2:#0d0d0d;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    body{overscroll-behavior:none}
    button,input,select{font:inherit}
    .app{
      height:100dvh;max-width:560px;margin:0 auto;padding:8px;gap:8px;
      display:grid;grid-template-rows:1fr auto 1fr;background:#000;
    }
    .panel,.center,.sheet,.settings{
      background:var(--panel);border:1px solid var(--line);box-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    .panel{border-radius:32px;overflow:hidden;min-height:0}
    .panel-inner{
      height:100%;display:flex;flex-direction:column;justify-content:space-between;
      padding:14px;transition:transform .2s ease;transform-origin:center center;
    }
    .rotated{transform:rotate(180deg)}
    .head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .label{
      font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;
    }
    .lp{
      font-size:clamp(48px,13vw,88px);font-weight:800;letter-spacing:-.05em;line-height:.9;
      font-variant-numeric:tabular-nums;overflow-wrap:anywhere;
    }
    .player-time-block{margin-top:8px}
    .player-time{
      font-size:clamp(20px,5vw,34px);font-weight:800;line-height:1;font-variant-numeric:tabular-nums;
    }
    .controls{
      display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:end;
    }
    .icon-btn,.circle-btn,.mini-btn,.preset-btn,.action-btn,.ghost-btn{
      border:none;outline:none;color:#fff;background:var(--gray);border:1px solid #262626;
    }
    .icon-btn{
      width:46px;height:46px;border-radius:999px;display:grid;place-items:center;font-size:20px;
    }
    .action-btn{
      height:min(20vw,96px);aspect-ratio:1/1;width:100%;max-width:96px;justify-self:center;
      border-radius:999px;font-size:34px;font-weight:800;display:grid;place-items:center;
    }
    .minus{background:var(--red);border-color:var(--red);color:#fff}
    .plus{background:var(--green);border-color:var(--green);color:#04130a}
    .turn-btn{
      background:#0b0b0b;border-color:#2b2b2b;color:var(--blue);font-size:22px;font-weight:800;
    }
    .turn-btn.active{
      background:var(--blue);border-color:var(--blue);color:#000;
      box-shadow:0 0 0 2px rgba(59,130,246,.18) inset, 0 0 22px rgba(59,130,246,.18);
    }
    .turn-btn.disabled{
      opacity:.45;
    }
    .center{
      border-radius:28px;padding:10px;display:grid;gap:8px;grid-template-columns:1fr 1fr 1fr;
      align-items:stretch;
    }
    .mini-btn{
      min-height:58px;border-radius:999px;display:grid;place-items:center;padding:0;
      font-size:20px;font-weight:700;background:#111;
    }
    .undo{background:var(--blue);border-color:var(--blue);color:#fff}
    .settings-btn{background:#141414}
    .reset-btn{background:#141414}
    .hidden{display:none !important}
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.84);display:flex;align-items:flex-end;justify-content:center;
      padding:12px;z-index:20;
    }
    .sheet,.settings{width:min(100%,440px);border-radius:30px;padding:14px}
    .sheet-head,.settings-head{
      display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;
    }
    .title{font-size:22px;font-weight:800;letter-spacing:-.03em}
    .amount-display{
      border-radius:24px;min-height:96px;background:#0b0b0b;border:1px solid #1f1f1f;display:grid;
      place-items:center;margin-bottom:12px;padding:8px;
    }
    .amount-display .big{
      font-size:54px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.05em;word-break:break-word;
    }
    .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
    .circle-btn{
      aspect-ratio:1/1;width:100%;border-radius:999px;display:grid;place-items:center;
      font-size:24px;font-weight:700;background:#121212;
    }
    .confirm-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .confirm-btn,.cancel-btn{
      height:54px;border:none;border-radius:999px;font-weight:700;font-size:17px;
    }
    .confirm-plus{background:var(--green);color:#04130a}
    .confirm-minus{background:var(--red);color:#fff}
    .cancel-btn{background:#181818;color:#fff;border:1px solid #2a2a2a}
    .settings-body{display:grid;gap:16px}
    .setting-block{display:grid;gap:8px}
    .setting-title{font-size:14px;color:#d5d5d5;font-weight:600}
    .toggle-row{
      display:flex;align-items:center;justify-content:space-between;gap:12px;background:#0d0d0d;
      border:1px solid #1f1f1f;border-radius:18px;padding:12px 14px;
    }
    .toggle{
      width:58px;height:34px;border-radius:999px;background:#1a1a1a;border:1px solid #2b2b2b;position:relative;cursor:pointer;
    }
    .toggle::after{
      content:"";position:absolute;width:26px;height:26px;border-radius:50%;top:3px;left:3px;background:#fff;
      transition:transform .18s ease;
    }
    .toggle.on{background:var(--blue);border-color:var(--blue)}
    .toggle.on::after{transform:translateX(24px)}
    .segmented{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .segmented-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .preset-btn,.ghost-btn{
      height:52px;border-radius:999px;background:#111;color:#fff;font-weight:700;
    }
    .preset-btn.active,.ghost-btn.active{
      background:var(--blue);border-color:var(--blue);color:#000;
    }
    .start-row{display:grid;grid-template-columns:1fr auto;gap:10px}
    .start-input{
      height:54px;border-radius:999px;border:1px solid #2a2a2a;background:#0c0c0c;color:#fff;text-align:center;
      font-size:22px;font-weight:700;outline:none;width:100%;
    }
    .apply-btn{
      height:54px;padding:0 20px;border:none;border-radius:999px;background:#fff;color:#000;font-weight:700;font-size:16px;
    }
    .tiny{font-size:12px;color:var(--muted);line-height:1.2}
    .inline-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
    .time-input{
      width:120px;height:52px;border-radius:999px;border:1px solid #2a2a2a;background:#0c0c0c;color:#fff;
      text-align:center;font-size:20px;font-weight:800;outline:none;
    }
    @media (max-height:760px){
      .app{gap:6px;padding:6px}
      .panel-inner{padding:12px}
      .center{padding:8px}
      .lp{font-size:clamp(42px,12vw,74px)}
      .action-btn{height:min(18vw,82px);max-width:82px;font-size:30px}
      .mini-btn{min-height:52px}
      .player-time{font-size:clamp(18px,4vw,28px)}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="panel-inner rotated" id="player0Inner">
        <div class="head">
          <div>
            <div class="label">Top Player</div>
            <div class="lp" id="lp0">8000</div>
            <div class="player-time-block">
              <div class="label">Time</div>
              <div class="player-time" id="time0">03:00</div>
            </div>
          </div>
          <button class="icon-btn" id="rotate0" aria-label="Rotate top player">⟳</button>
        </div>
        <div class="controls">
          <button class="action-btn minus" id="minus0" aria-label="Subtract life points">−</button>
          <button class="action-btn turn-btn" id="turn0" aria-label="End top player's turn">▶</button>
          <button class="action-btn plus" id="plus0" aria-label="Add life points">+</button>
        </div>
      </div>
    </section>

    <section class="center">
      <button class="mini-btn undo" id="undoBtn" aria-label="Undo">↶</button>
      <button class="mini-btn settings-btn" id="settingsBtn" aria-label="Settings">⚙</button>
      <button class="mini-btn reset-btn" id="resetBtn" aria-label="Reset match">⟲</button>
    </section>

    <section class="panel">
      <div class="panel-inner" id="player1Inner">
        <div class="head">
          <div>
            <div class="label">Bottom Player</div>
            <div class="lp" id="lp1">8000</div>
            <div class="player-time-block">
              <div class="label">Time</div>
              <div class="player-time" id="time1">03:00</div>
            </div>
          </div>
          <button class="icon-btn" id="rotate1" aria-label="Rotate bottom player">⟳</button>
        </div>
        <div class="controls">
          <button class="action-btn minus" id="minus1" aria-label="Subtract life points">−</button>
          <button class="action-btn turn-btn" id="turn1" aria-label="End bottom player's turn">▶</button>
          <button class="action-btn plus" id="plus1" aria-label="Add life points">+</button>
        </div>
      </div>
    </section>
  </main>

  <div class="overlay hidden" id="keypadOverlay">
    <section class="sheet">
      <div class="sheet-head">
        <div>
          <div class="label" id="sheetPlayerLabel">Player 1</div>
          <div class="title" id="sheetActionTitle">Add LP</div>
        </div>
        <button class="icon-btn" id="closeSheetBtn" aria-label="Close">✕</button>
      </div>

      <div class="amount-display">
        <div class="big" id="keypadValue">0</div>
      </div>

      <div class="keypad">
        <button class="circle-btn" data-key="1">1</button>
        <button class="circle-btn" data-key="2">2</button>
        <button class="circle-btn" data-key="3">3</button>
        <button class="circle-btn" data-key="4">4</button>
        <button class="circle-btn" data-key="5">5</button>
        <button class="circle-btn" data-key="6">6</button>
        <button class="circle-btn" data-key="7">7</button>
        <button class="circle-btn" data-key="8">8</button>
        <button class="circle-btn" data-key="9">9</button>
        <button class="circle-btn" data-key="00">00</button>
        <button class="circle-btn" data-key="0">0</button>
        <button class="circle-btn" data-key="back">⌫</button>
      </div>

      <div class="confirm-row">
        <button class="cancel-btn" id="cancelActionBtn">Cancel</button>
        <button class="confirm-btn confirm-plus" id="confirmActionBtn">Confirm</button>
      </div>
    </section>
  </div>

  <div class="overlay hidden" id="settingsOverlay">
    <section class="settings">
      <div class="settings-head">
        <div class="title">Settings</div>
        <button class="icon-btn" id="closeSettingsBtn" aria-label="Close settings">✕</button>
      </div>

      <div class="settings-body">
        <div class="setting-block">
          <div class="setting-title">Starting LP</div>
          <div class="segmented">
            <button class="preset-btn" data-start="4000">4000</button>
            <button class="preset-btn" data-start="8000">8000</button>
            <button class="preset-btn" data-start="12000">12000</button>
            <button class="preset-btn" data-start="16000">16000</button>
          </div>
          <div class="start-row">
            <input class="start-input" id="startingLpInput" inputmode="numeric" pattern="[0-9]*" value="8000" />
            <button class="apply-btn" id="applyStartBtn">Apply</button>
          </div>
        </div>

        <div class="setting-block">
          <div class="setting-title">Chess timer enabled</div>
          <div class="toggle-row">
            <div>
              <div>Show per-player timers</div>
              <div class="tiny">One side runs at a time. Tap your blue button to hand the turn over.</div>
            </div>
            <button class="toggle on" id="timerEnabledToggle" aria-label="Toggle timer"></button>
          </div>
        </div>

        <div class="setting-block" id="timerControlsBlock">
          <div class="setting-title">Base time</div>
          <div class="segmented-3">
            <button class="ghost-btn" data-base-min="1">1 min</button>
            <button class="ghost-btn" data-base-min="3">3 min</button>
            <button class="ghost-btn" data-base-min="5">5 min</button>
          </div>
          <div class="inline-row">
            <div class="tiny">Custom minutes</div>
            <input class="time-input" id="baseMinutesInput" inputmode="numeric" pattern="[0-9]*" value="3" />
          </div>
        </div>

        <div class="setting-block" id="incrementControlsBlock">
          <div class="setting-title">Increment per turn</div>
          <div class="segmented-3">
            <button class="ghost-btn" data-inc-sec="0">0 sec</button>
            <button class="ghost-btn" data-inc-sec="2">2 sec</button>
            <button class="ghost-btn" data-inc-sec="5">5 sec</button>
          </div>
          <div class="inline-row">
            <div class="tiny">Custom seconds</div>
            <input class="time-input" id="incrementInput" inputmode="numeric" pattern="[0-9]*" value="0" />
          </div>
        </div>

        <div class="setting-block">
          <div class="setting-title">Who starts</div>
          <div class="segmented">
            <button class="ghost-btn" id="starter0Btn">Top</button>
            <button class="ghost-btn" id="starter1Btn">Bottom</button>
          </div>
        </div>

        <div class="setting-block">
          <div class="setting-title">Timer reset</div>
          <div class="segmented">
            <button class="ghost-btn" id="pauseTimersBtn">Pause</button>
            <button class="ghost-btn" id="resetTimersBtn">Reset timers</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "ygo_lp_tracker_v3";
    const DEFAULT_STATE = () => ({
      startingLP: 8000,
      players: [
        { lp: 8000, rotated: true, timeLeft: 180 },
        { lp: 8000, rotated: false, timeLeft: 180 }
      ],
      timerEnabled: true,
      baseMinutes: 3,
      incrementSeconds: 0,
      activePlayer: null
    });

    let state = loadState() || DEFAULT_STATE();
    let history = [];
    let timerId = null;
    let pendingAction = null;

    const lpEls = [document.getElementById("lp0"), document.getElementById("lp1")];
    const timeEls = [document.getElementById("time0"), document.getElementById("time1")];
    const innerEls = [document.getElementById("player0Inner"), document.getElementById("player1Inner")];
    const turnBtns = [document.getElementById("turn0"), document.getElementById("turn1")];
    const startingLpInput = document.getElementById("startingLpInput");
    const timerEnabledToggle = document.getElementById("timerEnabledToggle");
    const baseMinutesInput = document.getElementById("baseMinutesInput");
    const incrementInput = document.getElementById("incrementInput");
    const timerControlsBlock = document.getElementById("timerControlsBlock");
    const incrementControlsBlock = document.getElementById("incrementControlsBlock");

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }
    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }
    function pushHistory() {
      history.push(clone(state));
      if (history.length > 100) history.shift();
    }
    function sanitizeInt(value, fallback=0) {
      const n = parseInt(String(value).replace(/[^\d]/g, ""), 10);
      return Number.isFinite(n) ? n : fallback;
    }
    function formatTime(totalSeconds) {
      const safe = Math.max(0, totalSeconds|0);
      const mins = Math.floor(safe / 60);
      const secs = safe % 60;
      return String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0");
    }
    function resetPlayerTimes() {
      const secs = Math.max(1, sanitizeInt(state.baseMinutes, 3)) * 60;
      state.players[0].timeLeft = secs;
      state.players[1].timeLeft = secs;
      state.activePlayer = null;
    }
    function syncTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
      if (state.timerEnabled && (state.activePlayer === 0 || state.activePlayer === 1)) {
        timerId = setInterval(() => {
          const p = state.players[state.activePlayer];
          p.timeLeft = Math.max(0, p.timeLeft - 1);
          if (p.timeLeft <= 0) {
            state.activePlayer = null;
          }
          render();
          saveState();
          if (state.activePlayer === null) syncTimer();
        }, 1000);
      }
    }
    function render() {
      lpEls[0].textContent = state.players[0].lp;
      lpEls[1].textContent = state.players[1].lp;
      timeEls[0].textContent = state.timerEnabled ? formatTime(state.players[0].timeLeft) : "--:--";
      timeEls[1].textContent = state.timerEnabled ? formatTime(state.players[1].timeLeft) : "--:--";
      innerEls[0].classList.toggle("rotated", !!state.players[0].rotated);
      innerEls[1].classList.toggle("rotated", !!state.players[1].rotated);
      startingLpInput.value = state.startingLP;
      baseMinutesInput.value = state.baseMinutes;
      incrementInput.value = state.incrementSeconds;
      timerEnabledToggle.classList.toggle("on", !!state.timerEnabled);
      timerControlsBlock.classList.toggle("hidden", !state.timerEnabled);
      incrementControlsBlock.classList.toggle("hidden", !state.timerEnabled);

      turnBtns.forEach((btn, idx) => {
        btn.classList.toggle("active", state.activePlayer === idx);
        const disabled = !state.timerEnabled || state.activePlayer === idx || state.players[idx].timeLeft <= 0;
        btn.classList.toggle("disabled", disabled);
        btn.textContent = state.activePlayer === idx ? "■" : "▶";
      });

      document.querySelectorAll("[data-base-min]").forEach(btn => {
        btn.classList.toggle("active", Number(btn.dataset.baseMin) === Number(state.baseMinutes));
      });
      document.querySelectorAll("[data-inc-sec]").forEach(btn => {
        btn.classList.toggle("active", Number(btn.dataset.incSec) === Number(state.incrementSeconds));
      });
      document.getElementById("starter0Btn").classList.toggle("active", state.activePlayer === 0);
      document.getElementById("starter1Btn").classList.toggle("active", state.activePlayer === 1);
    }

    function handTurnTo(nextPlayer) {
      if (!state.timerEnabled) return;
      const prev = state.activePlayer;
      if (prev === nextPlayer) return;
      pushHistory();

      if (prev === 0 || prev === 1) {
        state.players[prev].timeLeft += sanitizeInt(state.incrementSeconds, 0);
      }
      if (state.players[nextPlayer].timeLeft <= 0) {
        render();
        saveState();
        return;
      }
      state.activePlayer = nextPlayer;
      syncTimer();
      render();
      saveState();
    }

    function pauseTimers() {
      pushHistory();
      state.activePlayer = null;
      syncTimer();
      render();
      saveState();
    }

    function openKeypad(playerIndex, mode) {
      pendingAction = { playerIndex, mode, value: "" };
      document.getElementById("sheetPlayerLabel").textContent = "Player " + (playerIndex + 1);
      document.getElementById("sheetActionTitle").textContent = mode === "add" ? "Add LP" : "Subtract LP";
      document.getElementById("confirmActionBtn").className = "confirm-btn " + (mode === "add" ? "confirm-plus" : "confirm-minus");
      updateKeypadValue();
      document.getElementById("keypadOverlay").classList.remove("hidden");
    }
    function closeKeypad() {
      pendingAction = null;
      document.getElementById("keypadOverlay").classList.add("hidden");
    }
    function updateKeypadValue() {
      document.getElementById("keypadValue").textContent = pendingAction && pendingAction.value ? pendingAction.value : "0";
    }
    function keypadPress(key) {
      if (!pendingAction) return;
      if (key === "back") {
        pendingAction.value = pendingAction.value.slice(0, -1);
      } else {
        const next = (pendingAction.value + key).replace(/^0+(?=\d)/, "");
        pendingAction.value = next.slice(0, 6);
      }
      updateKeypadValue();
    }
    function confirmAction() {
      if (!pendingAction) return;
      const amount = sanitizeInt(pendingAction.value, 0);
      if (amount <= 0) return;
      pushHistory();
      const sign = pendingAction.mode === "add" ? 1 : -1;
      const player = state.players[pendingAction.playerIndex];
      player.lp = Math.max(0, player.lp + sign * amount);
      saveState();
      render();
      closeKeypad();
    }

    document.getElementById("minus0").addEventListener("click", () => openKeypad(0, "subtract"));
    document.getElementById("plus0").addEventListener("click", () => openKeypad(0, "add"));
    document.getElementById("minus1").addEventListener("click", () => openKeypad(1, "subtract"));
    document.getElementById("plus1").addEventListener("click", () => openKeypad(1, "add"));

    document.getElementById("turn0").addEventListener("click", () => {
      if (state.activePlayer === 1 || state.activePlayer === null) handTurnTo(0);
    });
    document.getElementById("turn1").addEventListener("click", () => {
      if (state.activePlayer === 0 || state.activePlayer === null) handTurnTo(1);
    });

    document.getElementById("rotate0").addEventListener("click", () => {
      pushHistory();
      state.players[0].rotated = !state.players[0].rotated;
      saveState();
      render();
    });
    document.getElementById("rotate1").addEventListener("click", () => {
      pushHistory();
      state.players[1].rotated = !state.players[1].rotated;
      saveState();
      render();
    });

    document.querySelectorAll("[data-key]").forEach(btn => {
      btn.addEventListener("click", () => keypadPress(btn.dataset.key));
    });
    document.getElementById("confirmActionBtn").addEventListener("click", confirmAction);
    document.getElementById("cancelActionBtn").addEventListener("click", closeKeypad);
    document.getElementById("closeSheetBtn").addEventListener("click", closeKeypad);

    document.getElementById("undoBtn").addEventListener("click", () => {
      if (!history.length) return;
      state = history.pop();
      syncTimer();
      saveState();
      render();
      closeKeypad();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      pushHistory();
      state.players[0].lp = state.startingLP;
      state.players[1].lp = state.startingLP;
      resetPlayerTimes();
      syncTimer();
      saveState();
      render();
      closeKeypad();
    });

    document.getElementById("settingsBtn").addEventListener("click", () => {
      document.getElementById("settingsOverlay").classList.remove("hidden");
    });
    document.getElementById("closeSettingsBtn").addEventListener("click", () => {
      document.getElementById("settingsOverlay").classList.add("hidden");
    });

    document.getElementById("applyStartBtn").addEventListener("click", () => {
      pushHistory();
      state.startingLP = Math.max(1, sanitizeInt(startingLpInput.value, 8000));
      state.players[0].lp = state.startingLP;
      state.players[1].lp = state.startingLP;
      resetPlayerTimes();
      syncTimer();
      saveState();
      render();
      document.getElementById("settingsOverlay").classList.add("hidden");
    });

    document.querySelectorAll("[data-start]").forEach(btn => {
      btn.addEventListener("click", () => {
        startingLpInput.value = btn.dataset.start;
      });
    });

    timerEnabledToggle.addEventListener("click", () => {
      pushHistory();
      state.timerEnabled = !state.timerEnabled;
      if (!state.timerEnabled) state.activePlayer = null;
      syncTimer();
      saveState();
      render();
    });

    document.querySelectorAll("[data-base-min]").forEach(btn => {
      btn.addEventListener("click", () => {
        pushHistory();
        state.baseMinutes = Number(btn.dataset.baseMin);
        resetPlayerTimes();
        syncTimer();
        saveState();
        render();
      });
    });
    document.querySelectorAll("[data-inc-sec]").forEach(btn => {
      btn.addEventListener("click", () => {
        pushHistory();
        state.incrementSeconds = Number(btn.dataset.incSec);
        saveState();
        render();
      });
    });

    baseMinutesInput.addEventListener("change", () => {
      pushHistory();
      state.baseMinutes = Math.max(1, sanitizeInt(baseMinutesInput.value, 3));
      resetPlayerTimes();
      syncTimer();
      saveState();
      render();
    });
    incrementInput.addEventListener("change", () => {
      pushHistory();
      state.incrementSeconds = Math.max(0, sanitizeInt(incrementInput.value, 0));
      saveState();
      render();
    });

    document.getElementById("starter0Btn").addEventListener("click", () => {
      if (!state.timerEnabled) return;
      handTurnTo(0);
    });
    document.getElementById("starter1Btn").addEventListener("click", () => {
      if (!state.timerEnabled) return;
      handTurnTo(1);
    });
    document.getElementById("pauseTimersBtn").addEventListener("click", pauseTimers);
    document.getElementById("resetTimersBtn").addEventListener("click", () => {
      pushHistory();
      resetPlayerTimes();
      syncTimer();
      saveState();
      render();
    });

    document.getElementById("keypadOverlay").addEventListener("click", (e) => {
      if (e.target.id === "keypadOverlay") closeKeypad();
    });
    document.getElementById("settingsOverlay").addEventListener("click", (e) => {
      if (e.target.id === "settingsOverlay") document.getElementById("settingsOverlay").classList.add("hidden");
    });

    if (!state.players[0].timeLeft && !state.players[1].timeLeft) resetPlayerTimes();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }

    render();
    syncTimer();
  </script>
</body>
</html>
